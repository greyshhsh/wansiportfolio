<!DOCTYPE html>
<html>
<head>
    <title>Using Display Property</title>
    <style>
        .textbox {
            display: block;
            width: 250px;
            margin-bottom: 10px;
        }

        .inline p {
            display: inline-block;
            width: 200px;
            vertical-align: middle;
        }

        .inline button {
            display: inline-block;
            width: 60px;
            vertical-align: middle;
        }
        .google {
            margin-top: 30px;
            text-align: center;
        }

        .google img {
            width: 250px;
            display: block;
            margin: 10px auto;
        }

        .search-box {
            width: 500px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 16px;
            outline: none;
            background-image: linear-gradient(white, white),linear-gradient(90deg,#4285F4,#DB4437,#F4B400,#0F9D58); 
            background-origin: border-box;
            background-clip: padding-box, border-box;
        }
        .search-box:focus {
            box-shadow: 0 0 8px rgba(66,133,244,0.6);
        }

        /* challenge */
        .sign-upbox{
            width:300px;
            padding:20px;
            border: 1px solid #ccc;
            margin-top: 4opx;
        }

        .inline-input{
            display: inline-block;
            width: 45%;
            padding: 8px;
            margin-bottom: 10px;
        }

        .email-input{
            display:block;
            width: 95%;
            padding: 8px;
            margin-bottom: 10px;
        }

        .signup-btn{
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #4285F4;
            color: white;
            border: none;
        }

        /*uber*/
        .uber-box{
            width: 350px;
            padding: 20px;
            border: 1px solid #ccc;
            margin-top: 40px;
        }
        .uber-input{
            display: block;
            width:95%;
            padding: 10px;
            margin-bottom: 10px;
            background-color: aliceblue;
            border: none;
        }

        .uber-btn{
            display: inline-block;
            padding:10px 15px;
            margin-right: 10px;
            border:none;
        }
        .black{
            background-color:black;
            color: white;
        }
        .gray{
            background-color: #ddd;
        }
    </style>
</head>
<body>
<fieldset>

    <div class="indent">
        <input type="text" class="textbox" placeholder="Name">
        <input type="email" class="textbox" placeholder="Email">
    </div>

    <div class="inline">
        <p>
            Thanks for chatting with our <br> customer support.
            Would you <br> like to take our quick survey?
        </p>
        <button>Yes</button>
        <button>No</button>
    </div>
    <div class="google">
        <img src="/IMAGE/google-logo-icon-illustration-free-vector.jpg" alt="Google Logo">

        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" class="search-box"
            placeholder="Search Google or type a URL">
        </form>
    </div>

    <div class="sign-upbox">
        <input type="text" placeholder="First Name" class="inline-input">
        <input type="text" placeholder="Last Name" class="inline-input">
        <input type="email" placeholder="Email" class="email-input">
        <button class="signup-btn">Sign Up</button>
    </div>
    <div class=".uber-box">
        <h2>Request A Ride Now</h2>
        <input type="text" placeholder="Enter Pick-up Location" class="uber-input">
        <input type="text" placeholder="Enter Destination" class="uber-input">

        <button class="uber-btn black">Request Now</button>
        <button class="uber-btn gray">Schedule for Later</button>
    </div>
</fieldset>

</body>
</html>
